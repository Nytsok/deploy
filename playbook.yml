---
- name: "Ubuntu custom - GNOME + ZSH + X11 + Dark mode + Docker + Exegold + tmux + KVM"
  hosts: localhost
  become: false
  gather_facts: true

  vars:
    user_home: "{{ ansible_env.HOME }}"
    zshrc_path: "{{ user_home }}/.zshrc"
    omz_dir: "{{ user_home }}/.oh-my-zsh"
    exegold_dir: "{{ user_home }}/Exegold"
    exegold_venv: "{{ exegold_dir }}/venv"
    terminal_colors_file: "{{ user_home }}/terminal-colors.dconf"
    veracrypt_version: "1.26.24"
    veracrypt_ubuntu: "24.04"
    balena_etcher_version: "2.1.4"
    terminal_profile_id: "12cb3421-ab18-45fc-b08a-f5ad3b883a35"

    # Liste centralisée des raccourcis clavier personnalisés
    custom_keybinding_paths:
      - "/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/taskmanager/"
      - "/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/flameshot/"

    # Applications favorites du dock (définies une seule fois)
    dock_favorites:
      - org.gnome.Nautilus.desktop
      - org.gnome.Terminal.desktop
      - google-chrome.desktop
      - virtualbox.desktop
      - mullvad-vpn.desktop
      - cherrytree.desktop
      - org.gnome.TextEditor.desktop
      - veracrypt.desktop
      - snap-store_snap-store.desktop
      - chrome-faolnafnngnfdaknnbpnkhgohbobgegn-Default.desktop
      - chrome-cifhbcnohmdccbgoicgdjpfamggdegmo-Default.desktop
      - chrome-nfnklejkcmehokldgamdamnfigjighke-Default.desktop
      - chrome-blgdilankhbcpipclgpdndahbehalgkh-Default.desktop
      - chrome-cadlkienfkclaiaibeoongdcgmdikeeg-Default.desktop
      - balena-etcher.desktop
      - rpi-imager_rpi-imager.desktop

    # gsettings groupés pour réduire la duplication
    gnome_power_settings:
      - { schema: "org.gnome.desktop.screensaver", key: "lock-enabled", value: "false" }
      - { schema: "org.gnome.desktop.screensaver", key: "ubuntu-lock-on-suspend", value: "false" }
      - { schema: "org.gnome.settings-daemon.plugins.power", key: "sleep-inactive-ac-type", value: "'nothing'" }
      - { schema: "org.gnome.settings-daemon.plugins.power", key: "sleep-inactive-battery-type", value: "'nothing'" }
      - { schema: "org.gnome.settings-daemon.plugins.power", key: "lid-close-ac-action", value: "'nothing'" }
      - { schema: "org.gnome.settings-daemon.plugins.power", key: "lid-close-battery-action", value: "'nothing'" }
      - { schema: "org.gnome.settings-daemon.plugins.power", key: "idle-dim", value: "false" }
      - { schema: "org.gnome.settings-daemon.plugins.power", key: "power-saver-profile-on-low-battery", value: "false" }
      - { schema: "org.gnome.desktop.session", key: "idle-delay", value: "0" }

    zsh_plugins:
      - { name: zsh-syntax-highlighting, repo: "https://github.com/zsh-users/zsh-syntax-highlighting.git" }
      - { name: zsh-completions, repo: "https://github.com/zsh-users/zsh-completions.git" }
      - { name: zsh-autosuggestions, repo: "https://github.com/zsh-users/zsh-autosuggestions.git" }
      - { name: zsh-z, repo: "https://github.com/agkozak/zsh-z.git" }
      - { name: zsh-nvm, repo: "https://github.com/lukechilds/zsh-nvm.git" }

  handlers:
    - name: reboot_system
      become: true
      ansible.builtin.command: shutdown -r +1 "Redémarrage pour appliquer les changements (X11, Docker, etc.)"
      async: 1
      poll: 0

    - name: restart_networkmanager
      become: true
      ansible.builtin.systemd:
        name: NetworkManager
        state: restarted

    - name: restart_systemd_resolved
      become: true
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted

    - name: restart_docker
      become: true
      ansible.builtin.systemd:
        name: docker
        state: restarted
        daemon_reload: true

  tasks:
    # ======================
    # DBUS (pour gsettings)
    # ======================
    - name: "Récupérer l'UID utilisateur"
      ansible.builtin.command: id -u
      register: uid_cmd
      changed_when: false
      tags: [always]

    - name: "Définir DBUS_SESSION_BUS_ADDRESS"
      ansible.builtin.set_fact:
        dbus_addr: "unix:path=/run/user/{{ uid_cmd.stdout }}/bus"
      tags: [always]

    # ======================
    # GNOME – Désactiver verrouillage et veille automatique
    # ======================
    - name: "Configurer les paramètres d'alimentation GNOME"
      ansible.builtin.command: >
        gsettings set {{ item.schema }} {{ item.key }} {{ item.value }}
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      loop: "{{ gnome_power_settings }}"
      loop_control:
        label: "{{ item.schema }} {{ item.key }}"
      failed_when: false
      changed_when: false
      tags: [gnome, power]

    # ======================
    # Systemd – Configuration capot laptop
    # ======================
    - name: "Configurer systemd pour ignorer la fermeture du capot"
      become: true
      ansible.builtin.lineinfile:
        path: /etc/systemd/logind.conf
        regexp: "^#?{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
        backup: true
      loop:
        - { key: HandleLidSwitch, value: ignore }
        - { key: HandleLidSwitchDocked, value: ignore }
        - { key: HandleLidSwitchExternalPower, value: ignore }
      loop_control:
        label: "{{ item.key }}"
      notify: reboot_system
      tags: [system, power]

    # ======================
    # Forcer X11 (désactiver Wayland)
    # ======================
    - name: "Forcer X11 (WaylandEnable=false)"
      become: true
      ansible.builtin.lineinfile:
        path: /etc/gdm3/custom.conf
        regexp: '^\s*#?\s*WaylandEnable='
        line: 'WaylandEnable=false'
        create: true
        backup: true
      notify: reboot_system
      tags: [system, x11]

    # ======================
    # GNOME – Dark Mode
    # ======================
    - name: "Activer le dark mode GNOME"
      ansible.builtin.command: gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, appearance]

    - name: "Forcer thème GTK sombre"
      ansible.builtin.command: gsettings set org.gnome.desktop.interface gtk-theme 'Yaru-dark'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, appearance]

    # ======================
    # GNOME Terminal – Couleurs personnalisées
    # ======================
    - name: "Créer un nouveau profil terminal perso"
      ansible.builtin.shell: |
        PROFILE_ID="{{ terminal_profile_id }}"
        PROFILE_PATH="/org/gnome/terminal/legacy/profiles:/:$PROFILE_ID"

        # Ajouter le profil à la liste s'il n'existe pas
        current_list=$(dconf read /org/gnome/terminal/legacy/profiles:/list)
        if [[ ! "$current_list" =~ "$PROFILE_ID" ]]; then
          if [ "$current_list" = "@as []" ] || [ -z "$current_list" ]; then
            dconf write /org/gnome/terminal/legacy/profiles:/list "['$PROFILE_ID']"
          else
            new_list=$(echo "$current_list" | sed "s/]$/, '$PROFILE_ID']/")
            dconf write /org/gnome/terminal/legacy/profiles:/list "$new_list"
          fi
        fi

        # Définir comme profil par défaut
        dconf write /org/gnome/terminal/legacy/profiles:/default "'$PROFILE_ID'"

        # Appliquer les couleurs
        dconf write $PROFILE_PATH/visible-name "'perso'"
        dconf write $PROFILE_PATH/use-theme-colors "false"
        dconf write $PROFILE_PATH/use-theme-transparency "false"
        dconf write $PROFILE_PATH/use-transparent-background "false"
        dconf write $PROFILE_PATH/scroll-on-output "false"
        dconf write $PROFILE_PATH/scrollback-unlimited "true"
        dconf write $PROFILE_PATH/background-color "'rgb(0,0,0)'"
        dconf write $PROFILE_PATH/foreground-color "'rgb(255,255,255)'"
        dconf write $PROFILE_PATH/palette "['rgb(0,0,0)', 'rgb(255,0,0)', 'rgb(0,205,0)', 'rgb(205,205,0)', 'rgb(0,182,205)', 'rgb(205,0,205)', 'rgb(0,205,205)', 'rgb(250,235,215)', 'rgb(64,64,64)', 'rgb(255,0,0)', 'rgb(0,255,0)', 'rgb(255,255,0)', 'rgb(0,177,255)', 'rgb(195,79,79)', 'rgb(0,255,255)', 'rgb(255,255,255)']"
      args:
        executable: /bin/bash
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      changed_when: false
      tags: [gnome, terminal]

    - name: "Vérifier si le fichier de couleurs existe"
      ansible.builtin.stat:
        path: "{{ terminal_colors_file }}"
      register: terminal_colors_stat
      tags: [gnome, terminal]

    - name: "Importer les couleurs du terminal"
      ansible.builtin.shell: |
        dconf load /org/gnome/terminal/legacy/profiles:/ < {{ terminal_colors_file }}
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      when: terminal_colors_stat.stat.exists
      changed_when: false
      tags: [gnome, terminal]

    - name: "Afficher un message si le fichier de couleurs est absent"
      ansible.builtin.debug:
        msg: "Fichier {{ terminal_colors_file }} non trouvé. Couleurs par défaut conservées."
      when: not terminal_colors_stat.stat.exists
      tags: [gnome, terminal]

    # ======================
    # GNOME – Dock
    # ======================
    - name: "Mettre le dock en bas"
      ansible.builtin.command: gsettings set org.gnome.shell.extensions.dash-to-dock dock-position 'BOTTOM'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, dock]

    - name: "Mettre Show Apps en haut du dock"
      ansible.builtin.command: gsettings set org.gnome.shell.extensions.dash-to-dock show-apps-at-top true
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, dock]

    # ======================
    # GNOME – Afficher fichiers cachés
    # ======================
    - name: "Afficher les fichiers cachés par défaut dans Nautilus"
      ansible.builtin.command: "gsettings set {{ item.schema }} {{ item.key }} true"
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      loop:
        - { schema: "org.gtk.Settings.FileChooser", key: "show-hidden" }
        - { schema: "org.gnome.nautilus.preferences", key: "show-hidden-files" }
      loop_control:
        label: "{{ item.schema }}"
      failed_when: false
      changed_when: false
      tags: [gnome, files]

    # ======================
    # GNOME – Raccourcis clavier personnalisés
    # ======================
    - name: "Désactiver le raccourci de déconnexion par défaut"
      ansible.builtin.command: gsettings set org.gnome.settings-daemon.plugins.media-keys logout "[]"
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, shortcuts]

    - name: "Désactiver tous les raccourcis screenshot GNOME"
      ansible.builtin.command: "gsettings set org.gnome.shell.keybindings {{ item }} '[]'"
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      loop:
        - show-screenshot-ui
        - screenshot
        - screenshot-window
      failed_when: false
      changed_when: false
      tags: [gnome, flameshot]

    - name: "Enregistrer la liste des raccourcis clavier personnalisés"
      ansible.builtin.command: >
        gsettings set org.gnome.settings-daemon.plugins.media-keys custom-keybindings
        "{{ custom_keybinding_paths | string }}"
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      changed_when: false
      tags: [gnome, shortcuts]

    - name: "Configurer raccourci Ctrl+Alt+Delete pour Moniteur système"
      ansible.builtin.command: >
        gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybinding:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/taskmanager/
        {{ item.key }} '{{ item.value }}'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      loop:
        - { key: name, value: "Moniteur système" }
        - { key: command, value: "gnome-system-monitor" }
        - { key: binding, value: "<Control><Alt>Delete" }
      loop_control:
        label: "{{ item.key }}"
      changed_when: false
      tags: [gnome, shortcuts]

    - name: "Configurer Flameshot sur Print Screen"
      ansible.builtin.command: >
        gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybinding:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/flameshot/
        {{ item.key }} '{{ item.value }}'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      loop:
        - { key: name, value: "Flameshot" }
        - { key: command, value: "flameshot gui" }
        - { key: binding, value: "Print" }
      loop_control:
        label: "{{ item.key }}"
      changed_when: false
      tags: [gnome, flameshot]

    # ======================
    # APT – Dépôts externes + upgrade + paquets
    # ======================
    - name: "Ajouter clé Mullvad VPN"
      become: true
      ansible.builtin.get_url:
        url: https://repository.mullvad.net/deb/mullvad-keyring.asc
        dest: /usr/share/keyrings/mullvad-keyring.asc
        mode: "0644"
      tags: [apt, mullvad]

    - name: "Ajouter dépôt Mullvad VPN"
      become: true
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/mullvad.list
        content: "deb [signed-by=/usr/share/keyrings/mullvad-keyring.asc arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') }}] https://repository.mullvad.net/deb/stable stable main\n"
        mode: "0644"
      tags: [apt, mullvad]

    - name: "Ajouter clé GPG Cloudflare"
      become: true
      ansible.builtin.get_url:
        url: https://pkg.cloudflare.com/cloudflare-public-v2.gpg
        dest: /usr/share/keyrings/cloudflare-public-v2.gpg
        mode: "0644"
      tags: [cloudflared]

    - name: "Ajouter dépôt Cloudflared"
      become: true
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/cloudflared.list
        content: "deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main\n"
        mode: "0644"
      tags: [cloudflared]

    - name: "Full upgrade système (inclut mise à jour du cache)"
      become: true
      ansible.builtin.apt:
        upgrade: full
        update_cache: true
      tags: [apt, upgrade]

    - name: "Installer paquets système"
      become: true
      ansible.builtin.apt:
        name:
          - tar
          - bzip2
          - ansible
          - libreoffice
          - libreoffice-l10n-fr
          - libreoffice-help-fr
          - hunspell-fr
          - hyphen-fr
          - mythes-fr
          - openfortivpn
          - obs-studio
          - python3-pip
          - python3.12-venv
          - curl
          - git
          - zsh
          - fzf
          - tmux
          - flameshot
          - cherrytree
          - rpi-imager
          - keepassxc
          - vlc
          - timeshift
          - p7zip-full
          - file-roller
          - deja-dup
          - net-tools
          - qemu-kvm
          - libvirt-daemon-system
          - libvirt-clients
          - bridge-utils
          - virt-manager
          - gnome-tweaks
          - gnome-shell-extensions
          - mullvad-vpn
          - cloudflared
        state: present
      tags: [apt, packages]

    # ======================
    # Google Chrome
    # ======================
    - name: "Vérifier si Google Chrome est installé"
      ansible.builtin.command: dpkg -s google-chrome-stable
      register: chrome_check
      failed_when: false
      changed_when: false
      tags: [chrome]

    - name: "Télécharger Google Chrome .deb"
      ansible.builtin.get_url:
        url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        dest: /tmp/google-chrome.deb
        mode: "0644"
      when: chrome_check.rc != 0
      tags: [chrome]

    - name: "Installer Google Chrome"
      become: true
      ansible.builtin.apt:
        deb: /tmp/google-chrome.deb
        state: present
      when: chrome_check.rc != 0
      tags: [chrome]

    - name: "Nettoyer le fichier .deb Google Chrome"
      ansible.builtin.file:
        path: /tmp/google-chrome.deb
        state: absent
      tags: [chrome]

    # ======================
    # VeraCrypt
    # ======================
    - name: "Vérifier si VeraCrypt est installé"
      ansible.builtin.command: dpkg -s veracrypt
      register: veracrypt_check
      failed_when: false
      changed_when: false
      tags: [veracrypt]

    - name: "Télécharger VeraCrypt .deb"
      ansible.builtin.get_url:
        url: "https://launchpad.net/veracrypt/trunk/{{ veracrypt_version }}/+download/veracrypt-{{ veracrypt_version }}-Ubuntu-{{ veracrypt_ubuntu }}-amd64.deb"
        dest: /tmp/veracrypt.deb
        mode: "0644"
      when: veracrypt_check.rc != 0
      tags: [veracrypt]

    - name: "Installer VeraCrypt"
      become: true
      ansible.builtin.apt:
        deb: /tmp/veracrypt.deb
        state: present
      when: veracrypt_check.rc != 0
      tags: [veracrypt]

    - name: "Nettoyer le fichier .deb VeraCrypt"
      ansible.builtin.file:
        path: /tmp/veracrypt.deb
        state: absent
      tags: [veracrypt]

    # ======================
    # Balena Etcher
    # ======================
    - name: "Vérifier si Balena Etcher est installé"
      ansible.builtin.command: dpkg -s balena-etcher
      register: etcher_check
      failed_when: false
      changed_when: false
      tags: [etcher]

    - name: "Télécharger Balena Etcher .deb"
      ansible.builtin.get_url:
        url: "https://github.com/balena-io/etcher/releases/download/v{{ balena_etcher_version }}/balena-etcher_{{ balena_etcher_version }}_amd64.deb"
        dest: /tmp/balena-etcher.deb
        mode: "0644"
      when: etcher_check.rc != 0
      tags: [etcher]

    - name: "Installer Balena Etcher"
      become: true
      ansible.builtin.apt:
        deb: /tmp/balena-etcher.deb
        state: present
      when: etcher_check.rc != 0
      tags: [etcher]

    - name: "Nettoyer le fichier .deb Balena Etcher"
      ansible.builtin.file:
        path: /tmp/balena-etcher.deb
        state: absent
      tags: [etcher]

    # ======================
    # KVM / QEMU / libvirt
    # ======================
    - name: "Ajouter l'utilisateur aux groupes KVM et libvirt"
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups:
          - kvm
          - libvirt
        append: true
      notify: reboot_system
      tags: [kvm]

    - name: "Démarrer et activer libvirtd"
      become: true
      ansible.builtin.systemd:
        name: libvirtd
        state: started
        enabled: true
      tags: [kvm]

    - name: "Vérifier si le réseau default est actif"
      become: true
      ansible.builtin.command: virsh net-info default
      register: virsh_net_info
      failed_when: false
      changed_when: false
      tags: [kvm]

    - name: "Configurer le réseau bridge par défaut"
      become: true
      ansible.builtin.command: virsh net-autostart default
      when: virsh_net_info.rc == 0
      changed_when: "'already' not in virsh_net_info.stdout | default('')"
      failed_when: false
      tags: [kvm]

    - name: "Démarrer le réseau virtuel par défaut"
      become: true
      ansible.builtin.command: virsh net-start default
      when: virsh_net_info.rc == 0 and 'inactive' in virsh_net_info.stdout | default('')
      failed_when: false
      changed_when: true
      tags: [kvm]

    # ======================
    # Supprimer CUPS
    # ======================
    - name: "Arrêter et masquer le service cups"
      become: true
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
        masked: true
      loop:
        - cups.service
        - cups-browsed.service
      failed_when: false
      tags: [cups, cleanup]

    - name: "Supprimer CUPS (service d'impression)"
      become: true
      ansible.builtin.apt:
        name:
          - cups
          - cups-daemon
          - cups-browsed
        state: absent
        purge: true
      tags: [cups, cleanup]

    # ======================
    # NetworkManager – Désactiver envoi hostname DHCP
    # ======================
    - name: "Créer configuration NetworkManager pour désactiver hostname DHCP"
      become: true
      ansible.builtin.copy:
        dest: /etc/NetworkManager/conf.d/00-disable-dhcp-hostname.conf
        content: |
          [connection]
          ipv4.dhcp-send-hostname=no
          ipv6.dhcp-send-hostname=no
          ipv4.dhcp-hostname=
          ipv6.dhcp-hostname=
        mode: "0644"
      notify: restart_networkmanager
      tags: [networkmanager, privacy]

    # ======================
    # Désactiver avahi-daemon
    # ======================
    - name: "Désactiver et masquer avahi-daemon"
      become: true
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
        masked: true
      loop:
        - avahi-daemon.service
        - avahi-daemon.socket
      failed_when: false
      tags: [avahi, privacy]

    # ======================
    # systemd-resolved – Configuration DNS
    # ======================
    - name: "Désactiver DNSStubListener dans systemd-resolved"
      become: true
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^\s*#?\s*DNSStubListener='
        line: 'DNSStubListener=no'
        insertafter: '^\[Resolve\]'
        create: true
        backup: true
      notify: restart_systemd_resolved
      tags: [dns, systemd]

    - name: "Configurer resolv.conf comme lien symbolique"
      become: true
      ansible.builtin.file:
        src: /run/systemd/resolve/resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
      tags: [dns, systemd]

    # ======================
    # Docker
    # ======================
    - name: "Vérifier si Docker est installé"
      ansible.builtin.command: docker --version
      register: docker_check
      failed_when: false
      changed_when: false
      tags: [docker]

    - name: "Installer les prérequis Docker"
      become: true
      ansible.builtin.apt:
        name:
          - ca-certificates
          - gnupg
        state: present
      when: docker_check.rc != 0
      tags: [docker]

    - name: "Ajouter clé GPG Docker"
      become: true
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /usr/share/keyrings/docker-archive-keyring.asc
        mode: "0644"
      when: docker_check.rc != 0
      tags: [docker]

    - name: "Ajouter dépôt Docker"
      become: true
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.list
        content: "deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') }} signed-by=/usr/share/keyrings/docker-archive-keyring.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable\n"
        mode: "0644"
      when: docker_check.rc != 0
      tags: [docker]

    - name: "Installer Docker Engine"
      become: true
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      when: docker_check.rc != 0
      notify: reboot_system
      tags: [docker]

    - name: "Ajouter l'utilisateur au groupe docker"
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: true
      notify: reboot_system
      tags: [docker]

    - name: "Configurer Docker pour désactiver le bridge docker0"
      become: true
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "bridge": "none",
            "iptables": false
          }
        mode: "0644"
      notify: restart_docker
      tags: [docker]

    - name: "Supprimer l'interface docker0 si elle existe"
      become: true
      ansible.builtin.command: ip link delete docker0
      register: docker0_delete
      failed_when: false
      changed_when: docker0_delete.rc == 0
      tags: [docker, cleanup]

    # ======================
    # ZSH / Oh My Zsh
    # ======================
    - name: "Définir zsh comme shell par défaut"
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        shell: /usr/bin/zsh
      tags: [zsh]

    - name: "Vérifier Oh My Zsh"
      ansible.builtin.stat:
        path: "{{ omz_dir }}"
      register: omz_stat
      tags: [zsh]

    - name: "Installer Oh My Zsh"
      ansible.builtin.shell: |
        RUNZSH=no CHSH=no KEEP_ZSHRC=yes \
        sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
      args:
        executable: /bin/bash
      when: not omz_stat.stat.exists
      tags: [zsh]

    - name: "Forcer le thème gentoo"
      ansible.builtin.lineinfile:
        path: "{{ zshrc_path }}"
        regexp: '^ZSH_THEME='
        line: 'ZSH_THEME="gentoo"'
        create: true
      tags: [zsh]

    # ======================
    # Oh My Zsh – Plugins
    # ======================
    - name: "Installer plugins ZSH"
      ansible.builtin.git:
        repo: "{{ item.repo }}"
        dest: "{{ omz_dir }}/custom/plugins/{{ item.name }}"
        depth: 1
        update: true
      loop: "{{ zsh_plugins }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [zsh, plugins]

    - name: "Ajouter zsh-completions au fpath"
      ansible.builtin.blockinfile:
        path: "{{ zshrc_path }}"
        marker: "# {mark} ANSIBLE ZSH COMPLETIONS"
        insertbefore: '^source \$ZSH/oh-my-zsh\.sh'
        block: |
          fpath+=${ZSH_CUSTOM:-$HOME/.oh-my-zsh/custom}/plugins/zsh-completions/src
      tags: [zsh, plugins]

    - name: "Configurer plugins ZSH"
      ansible.builtin.lineinfile:
        path: "{{ zshrc_path }}"
        regexp: '^plugins='
        line: 'plugins=(zsh-syntax-highlighting zsh-completions zsh-autosuggestions tmux fzf zsh-z zsh-nvm)'
        create: true
      tags: [zsh, plugins]

    # ======================
    # ZSH – Aliases utiles
    # ======================
    - name: "Ajouter aliases ZSH utiles"
      ansible.builtin.blockinfile:
        path: "{{ zshrc_path }}"
        marker: "# {mark} ANSIBLE ZSH ALIASES"
        block: |
          # Système
          alias ports='netstat -tulanp'
          alias meminfo='free -m -l -t'
          alias psmem='ps auxf | sort -nr -k 4 | head -10'
          alias pscpu='ps auxf | sort -nr -k 3 | head -10'

          # Réseau
          alias myip='curl ifconfig.me'
          alias speed='speedtest-cli'

          # Téléchargement
          alias wget='wget -c'

          # Disque
          alias df='df -H'
          alias du='du -ch'

          # APT
          alias update='sudo apt update && sudo apt full-upgrade -y'
          alias cleanup='sudo apt autoremove -y && sudo apt autoclean'

          # Navigation
          alias ll='ls -lah'
          alias la='ls -A'
          alias l='ls -CF'

          # Sécurité
          alias chmod-files='find . -type f -exec chmod 644 {} \;'
          alias chmod-dirs='find . -type d -exec chmod 755 {} \;'
      tags: [zsh, aliases]

    # ======================
    # SSH – Configuration
    # ======================
    - name: "Créer le dossier .ssh si nécessaire"
      ansible.builtin.file:
        path: "{{ user_home }}/.ssh"
        state: directory
        mode: "0700"
      tags: [ssh]

    - name: "Créer le fichier de configuration SSH"
      ansible.builtin.copy:
        dest: "{{ user_home }}/.ssh/config"
        mode: "0600"
        force: false
        content: |
          Host *
              ServerAliveInterval 30
              ServerAliveCountMax 3
              TCPKeepAlive yes
              ConnectTimeout 10
              ConnectionAttempts 3
      tags: [ssh]

    # ======================
    # Exegold
    # ======================
    - name: "Cloner Exegold"
      ansible.builtin.git:
        repo: https://github.com/fsoc106/Exegold
        dest: "{{ exegold_dir }}"
        update: true
      tags: [exegold]

    - name: "Créer venv pour Exegold"
      ansible.builtin.command: python3 -m venv {{ exegold_venv }}
      args:
        creates: "{{ exegold_venv }}"
      tags: [exegold]

    - name: "Installer requirements Exegold dans venv"
      ansible.builtin.pip:
        requirements: "{{ exegold_dir }}/requirements.txt"
        virtualenv: "{{ exegold_venv }}"
      tags: [exegold]

    - name: "Créer script wrapper exegol"
      become: true
      ansible.builtin.copy:
        dest: /usr/local/bin/exegol
        mode: "0755"
        content: |
          #!/bin/bash
          {{ exegold_venv }}/bin/python {{ exegold_dir }}/exegol.py "$@"
      tags: [exegold]

    # ======================
    # GNOME – Applications favorites dans le dock
    # ======================
    - name: "Configurer les applications favorites dans le dock"
      ansible.builtin.command: >
        gsettings set org.gnome.shell favorite-apps "{{ dock_favorites | string }}"
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, dock]

    # ======================
    # Reboot
    # ======================
    - name: "Appliquer les handlers en attente"
      ansible.builtin.meta: flush_handlers
      tags: [reboot]

    - name: "Attendre confirmation avant reboot"
      ansible.builtin.pause:
        prompt: "Le système va redémarrer dans 1 minute. Appuyez sur Entrée pour continuer ou Ctrl+C puis 'A' pour annuler le reboot"
      tags: [reboot]

    - name: "Message final"
      ansible.builtin.debug:
        msg: "Configuration terminée ! Le système redémarrera dans 1 minute si des changements l'exigent."
      tags: [reboot]
