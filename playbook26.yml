---
- name: "Ubuntu custom - GNOME + ZSH + X11 + Dark mode + Flameshot + Docker + Exegold + tmux + VirtualBox + delayed reboot"
  hosts: localhost
  become: false
  gather_facts: true

  vars:
    user_home: "{{ ansible_env.HOME }}"
    zshrc_path: "{{ user_home }}/.zshrc"
    omz_dir: "{{ user_home }}/.oh-my-zsh"
    exegold_dir: "{{ user_home }}/Exegold"
    exegold_venv: "{{ exegold_dir }}/venv"
    terminal_colors_file: "{{ user_home }}/terminal-colors.dconf"
    # Ubuntu 26 – Python 3.14 par défaut (ajuster si nécessaire)
    python_version: "python3.14"

  handlers:
    - name: reboot_system
      become: true
      ansible.builtin.command: shutdown -r +1 "Redémarrage pour appliquer les changements (X11, Docker, etc.)"
      async: 1
      poll: 0

  tasks:
    # ======================
    # SUDO – NOPASSWD (doit être la toute première task)
    # Permet d'exécuter le playbook sans --ask-become-pass.
    # Pour le premier lancement, utiliser :
    #   sudo ansible-playbook playbook26.yml
    # Les lancements suivants fonctionneront sans sudo ni --ask-become-pass.
    # ======================
    - name: "Configurer sudo NOPASSWD pour l'utilisateur courant"
      become: true
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ ansible_user_id }}-nopasswd"
        content: "{{ ansible_user_id }} ALL=(ALL) NOPASSWD: ALL\n"
        mode: "0440"
        validate: "visudo -cf %s"
      tags: [sudo, always]

    # ======================
    # DBUS (pour gsettings)
    # ======================
    - name: "Récupérer l'UID utilisateur"
      ansible.builtin.command: id -u
      register: uid_cmd
      changed_when: false
      tags: [always]

    - name: "Définir DBUS_SESSION_BUS_ADDRESS"
      ansible.builtin.set_fact:
        dbus_addr: "unix:path=/run/user/{{ uid_cmd.stdout }}/bus"
      tags: [always]

    # ======================
    # GNOME – Désactiver verrouillage et veille automatique
    # ======================
    - name: "Désactiver le verrouillage automatique"
      ansible.builtin.command: gsettings set org.gnome.desktop.screensaver lock-enabled false
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, power]

    - name: "Désactiver le verrouillage après mise en veille"
      ansible.builtin.command: gsettings set org.gnome.desktop.screensaver ubuntu-lock-on-suspend false
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, power]

    - name: "Désactiver la mise en veille automatique (sur secteur)"
      ansible.builtin.command: gsettings set org.gnome.settings-daemon.plugins.power sleep-inactive-ac-type 'nothing'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, power]

    - name: "Désactiver la mise en veille automatique (sur batterie)"
      ansible.builtin.command: gsettings set org.gnome.settings-daemon.plugins.power sleep-inactive-battery-type 'nothing'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, power]

    - name: "Ne rien faire quand le capot est rabattu"
      ansible.builtin.command: gsettings set org.gnome.settings-daemon.plugins.power lid-close-ac-action 'nothing'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, power]

    - name: "Ne rien faire quand le capot est rabattu (sur batterie)"
      ansible.builtin.command: gsettings set org.gnome.settings-daemon.plugins.power lid-close-battery-action 'nothing'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, power]

    - name: "Désactiver la réduction de luminosité automatique"
      ansible.builtin.command: gsettings set org.gnome.settings-daemon.plugins.power idle-dim false
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, power]

    - name: "Désactiver l'extinction de l'écran (screen blank) sur secteur"
      ansible.builtin.command: gsettings set org.gnome.desktop.session idle-delay 0
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, power]

    - name: "Désactiver le power saver automatique"
      ansible.builtin.command: gsettings set org.gnome.settings-daemon.plugins.power power-saver-profile-on-low-battery false
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, power]

    # ======================
    # Systemd – Configuration capot laptop
    # ======================
    - name: "Configurer systemd pour ignorer la fermeture du capot"
      become: true
      ansible.builtin.lineinfile:
        path: /etc/systemd/logind.conf
        regexp: '^#?HandleLidSwitch='
        line: 'HandleLidSwitch=ignore'
        backup: true
      notify: reboot_system
      tags: [system, power]

    - name: "Configurer systemd pour ignorer la fermeture du capot sur dock"
      become: true
      ansible.builtin.lineinfile:
        path: /etc/systemd/logind.conf
        regexp: '^#?HandleLidSwitchDocked='
        line: 'HandleLidSwitchDocked=ignore'
        backup: true
      notify: reboot_system
      tags: [system, power]

    - name: "Configurer systemd pour ignorer la fermeture du capot avec alimentation externe"
      become: true
      ansible.builtin.lineinfile:
        path: /etc/systemd/logind.conf
        regexp: '^#?HandleLidSwitchExternalPower='
        line: 'HandleLidSwitchExternalPower=ignore'
        backup: true
      notify: reboot_system
      tags: [system, power]

    # ======================
    # Forcer X11 (désactiver Wayland)
    # NOTE Ubuntu 26 : GDM3 est remplacé par GDM dans certaines versions.
    # Le fichier /etc/gdm3/custom.conf peut avoir migré vers /etc/gdm/custom.conf.
    # Les deux chemins sont gérés ci-dessous.
    # ======================
    - name: "Vérifier si /etc/gdm3/custom.conf existe"
      ansible.builtin.stat:
        path: /etc/gdm3/custom.conf
      register: gdm3_conf
      tags: [system, x11]

    - name: "Vérifier si /etc/gdm/custom.conf existe"
      ansible.builtin.stat:
        path: /etc/gdm/custom.conf
      register: gdm_conf
      tags: [system, x11]

    - name: "Forcer X11 dans /etc/gdm3/custom.conf"
      become: true
      ansible.builtin.lineinfile:
        path: /etc/gdm3/custom.conf
        regexp: '^\s*#?\s*WaylandEnable='
        line: 'WaylandEnable=false'
        create: true
        backup: true
      when: gdm3_conf.stat.exists
      notify: reboot_system
      tags: [system, x11]

    - name: "Forcer X11 dans /etc/gdm/custom.conf (nouveau chemin Ubuntu 26)"
      become: true
      ansible.builtin.lineinfile:
        path: /etc/gdm/custom.conf
        regexp: '^\s*#?\s*WaylandEnable='
        line: 'WaylandEnable=false'
        create: true
        backup: true
      when: gdm_conf.stat.exists or not gdm3_conf.stat.exists
      notify: reboot_system
      tags: [system, x11]

    # ======================
    # GNOME – Dark Mode
    # NOTE Ubuntu 26 : Le thème Yaru-dark est toujours supporté mais
    # vérifier la disponibilité avec : gsettings get org.gnome.desktop.interface gtk-theme
    # ======================
    - name: "Activer le dark mode GNOME"
      ansible.builtin.command: gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, appearance]

    - name: "Forcer thème GTK sombre"
      ansible.builtin.command: gsettings set org.gnome.desktop.interface gtk-theme 'Yaru-dark'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, appearance]

    # ======================
    # GNOME Terminal – Couleurs personnalisées
    # ======================
    - name: "Créer un nouveau profil terminal perso"
      ansible.builtin.shell: |
        PROFILE_ID="12cb3421-ab18-45fc-b08a-f5ad3b883a35"
        PROFILE_PATH="/org/gnome/terminal/legacy/profiles:/:$PROFILE_ID"
        
        # Ajouter le profil à la liste s'il n'existe pas
        current_list=$(dconf read /org/gnome/terminal/legacy/profiles:/list)
        if [[ ! "$current_list" =~ "$PROFILE_ID" ]]; then
          if [ "$current_list" = "@as []" ] || [ -z "$current_list" ]; then
            dconf write /org/gnome/terminal/legacy/profiles:/list "['$PROFILE_ID']"
          else
            new_list=$(echo "$current_list" | sed "s/]$/, '$PROFILE_ID']/")
            dconf write /org/gnome/terminal/legacy/profiles:/list "$new_list"
          fi
        fi
        
        # Définir comme profil par défaut
        dconf write /org/gnome/terminal/legacy/profiles:/default "'$PROFILE_ID'"
        
        # Appliquer les couleurs
        dconf write $PROFILE_PATH/visible-name "'perso'"
        dconf write $PROFILE_PATH/use-theme-colors "false"
        dconf write $PROFILE_PATH/use-theme-transparency "false"
        dconf write $PROFILE_PATH/use-transparent-background "false"
        dconf write $PROFILE_PATH/scroll-on-output "false"
        dconf write $PROFILE_PATH/scrollback-unlimited "true"
        dconf write $PROFILE_PATH/background-color "'rgb(0,0,0)'"
        dconf write $PROFILE_PATH/foreground-color "'rgb(255,255,255)'"
        dconf write $PROFILE_PATH/palette "['rgb(0,0,0)', 'rgb(255,0,0)', 'rgb(0,205,0)', 'rgb(205,205,0)', 'rgb(0,182,205)', 'rgb(205,0,205)', 'rgb(0,205,205)', 'rgb(250,235,215)', 'rgb(64,64,64)', 'rgb(255,0,0)', 'rgb(0,255,0)', 'rgb(255,255,0)', 'rgb(0,177,255)', 'rgb(195,79,79)', 'rgb(0,255,255)', 'rgb(255,255,255)']"
      args:
        executable: /bin/bash
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      changed_when: false
      tags: [gnome, terminal]

    - name: "Vérifier si le fichier de couleurs existe"
      ansible.builtin.stat:
        path: "{{ terminal_colors_file }}"
      register: terminal_colors_stat
      tags: [gnome, terminal]

    - name: "Importer les couleurs du terminal"
      ansible.builtin.shell: |
        dconf load /org/gnome/terminal/legacy/profiles:/ < {{ terminal_colors_file }}
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      when: terminal_colors_stat.stat.exists
      changed_when: false
      tags: [gnome, terminal]

    - name: "Afficher un message si le fichier de couleurs est absent"
      ansible.builtin.debug:
        msg: "Fichier {{ terminal_colors_file }} non trouvé. Couleurs par défaut conservées."
      when: not terminal_colors_stat.stat.exists
      tags: [gnome, terminal]

    # ======================
    # GNOME – Dock
    # NOTE Ubuntu 26 : dash-to-dock est intégré nativement à GNOME Shell Ubuntu.
    # ======================
    - name: "Mettre le dock en bas"
      ansible.builtin.command: gsettings set org.gnome.shell.extensions.dash-to-dock dock-position 'BOTTOM'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, dock]

    - name: "Mettre Show Apps en haut du dock"
      ansible.builtin.command: gsettings set org.gnome.shell.extensions.dash-to-dock show-apps-at-top true
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, dock]

    # ======================
    # GNOME – Afficher fichiers cachés
    # ======================
    - name: "Afficher les fichiers cachés par défaut dans Nautilus"
      ansible.builtin.command: gsettings set org.gtk.Settings.FileChooser show-hidden true
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, files]

    - name: "Afficher les fichiers cachés dans Nautilus (file manager)"
      ansible.builtin.command: gsettings set org.gnome.nautilus.preferences show-hidden-files true
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, files]

    # ======================
    # GNOME – Raccourcis clavier personnalisés
    # ======================
    - name: "Désactiver le raccourci de déconnexion par défaut"
      ansible.builtin.command: gsettings set org.gnome.settings-daemon.plugins.media-keys logout "[]"
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, shortcuts]

    - name: "Ajouter raccourci Ctrl+Alt+Delete pour Moniteur système"
      ansible.builtin.shell: |
        BASE="/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings"
        PATHTM="$BASE/taskmanager/"
        
        current=$(gsettings get org.gnome.settings-daemon.plugins.media-keys custom-keybindings)
        current=$(echo "$current" | sed 's/@as //')
        
        if echo "$current" | grep -q "taskmanager"; then
          new="$current"
        else
          if [ "$current" = "[]" ] || [ "$current" = "" ]; then
            new="['$PATHTM']"
          else
            new=$(echo "$current" | sed "s/]$/, '$PATHTM']/")
          fi
        fi
        
        gsettings set org.gnome.settings-daemon.plugins.media-keys custom-keybindings "$new"
        gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybinding:$PATHTM name 'Moniteur système'
        gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybinding:$PATHTM command 'gnome-system-monitor'
        gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybinding:$PATHTM binding '<Control><Alt>Delete'
      args:
        executable: /bin/bash
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      changed_when: false
      tags: [gnome, shortcuts]

    # ======================
    # GNOME – Applications favorites dans le dock
    # NOTE Ubuntu 26 : virtualbox.desktop retiré (voir section VirtualBox).
    # Ajuster les .desktop des PWA Chrome si nécessaire.
    # ======================
    - name: "Configurer les applications favorites dans le dock"
      ansible.builtin.command: >
        gsettings set org.gnome.shell favorite-apps
        "['org.gnome.Nautilus.desktop', 'gnome-terminal.desktop', 'google-chrome.desktop',
        'mullvad-vpn.desktop', 'cherrytree.desktop', 'org.gnome.TextEditor.desktop',
        'veracrypt.desktop', 'snap-store_snap-store.desktop', 'chrome-faolnafnngnfdaknnbpnkhgohbobgegn-Default.desktop',
        'chrome-cifhbcnohmdccbgoicgdjpfamggdegmo-Default.desktop', 'chrome-nfnklejkcmehokldgamdamnfigjighke-Default.desktop',
        'chrome-blgdilankhbcpipclgpdndahbehalgkh-Default.desktop', 'chrome-cadlkienfkclaiaibeoongdcgmdikeeg-Default.desktop',
        'balena-etcher.desktop', 'rpi-imager_rpi-imager.desktop']"
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, dock]

    # ======================
    # APT – Mullvad + upgrade + paquets
    # ======================
    - name: "Ajouter clé Mullvad VPN"
      become: true
      ansible.builtin.get_url:
        url: https://repository.mullvad.net/deb/mullvad-keyring.asc
        dest: /usr/share/keyrings/mullvad-keyring.asc
        mode: "0644"
      tags: [apt, mullvad]

    - name: "Ajouter dépôt Mullvad VPN"
      become: true
      ansible.builtin.shell: |
        echo "deb [signed-by=/usr/share/keyrings/mullvad-keyring.asc arch=$(dpkg --print-architecture)] https://repository.mullvad.net/deb/stable stable main" | tee /etc/apt/sources.list.d/mullvad.list
      args:
        executable: /bin/bash
        creates: /etc/apt/sources.list.d/mullvad.list
      tags: [apt, mullvad]

    - name: "Full upgrade système"
      become: true
      ansible.builtin.apt:
        upgrade: full
        update_cache: true
      tags: [apt, upgrade]

    # ======================
    # Cloudflared
    # ======================
    - name: "Créer le dossier keyrings pour Cloudflare"
      become: true
      ansible.builtin.file:
        path: /usr/share/keyrings
        state: directory
        mode: "0755"
      tags: [cloudflared]

    - name: "Ajouter clé GPG Cloudflare"
      become: true
      ansible.builtin.get_url:
        url: https://pkg.cloudflare.com/cloudflare-public-v2.gpg
        dest: /usr/share/keyrings/cloudflare-public-v2.gpg
        mode: "0644"
      tags: [cloudflared]

    - name: "Ajouter dépôt Cloudflared"
      become: true
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/cloudflared.list
        content: "deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main\n"
        mode: "0644"
      tags: [cloudflared]

    - name: "Installer Cloudflared"
      become: true
      ansible.builtin.apt:
        name: cloudflared
        state: present
        update_cache: true
      tags: [cloudflared]

    # ======================
    # Installer paquets système
    # NOTE Ubuntu 26 :
    #   - python3.12-venv → remplacé par python3-venv (générique) + {{ python_version }}-venv
    #   - rpi-imager disponible via snap si absent des dépôts APT
    #   - gnome-tweaks toujours présent
    # ======================
    - name: "Installer les paquets système"
      become: true
      ansible.builtin.apt:
        name:
          - tar
          - bzip2
          - ansible
          - libreoffice
          - libreoffice-l10n-fr
          - libreoffice-help-fr
          - hunspell-fr
          - hyphen-fr
          - mythes-fr
          - openfortivpn
          - obs-studio
          - python3-pip
          - python3-venv
          - "{{ python_version }}-venv"
          - curl
          - git
          - zsh
          - fzf
          - tmux
          - flameshot
          - cherrytree
          - keepassxc
          - vlc
          - timeshift
          - p7zip-full
          - file-roller
          - deja-dup
          - net-tools
          - qemu-kvm
          - libvirt-daemon-system
          - libvirt-clients
          - bridge-utils
          - virt-manager
          - gnome-tweaks
          - gnome-shell-extensions
          - gnome-terminal
          - mullvad-vpn
        state: present
        update_cache: true
      tags: [apt, packages]

    # NOTE Ubuntu 26 : rpi-imager peut ne plus être dans APT.
    # Tentative APT, fallback snap.
    - name: "Installer rpi-imager via APT"
      become: true
      ansible.builtin.apt:
        name: rpi-imager
        state: present
      failed_when: false
      register: rpi_apt
      tags: [apt, packages]

    - name: "Installer rpi-imager via snap (fallback)"
      become: true
      community.general.snap:
        name: rpi-imager
        state: present
      when: rpi_apt is failed or rpi_apt.rc is defined
      failed_when: false
      tags: [apt, packages]

    # ======================
    # Google Chrome
    # ======================
    - name: "Télécharger Google Chrome .deb"
      ansible.builtin.get_url:
        url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        dest: /tmp/google-chrome.deb
        mode: "0644"
      tags: [chrome]

    - name: "Installer Google Chrome"
      become: true
      ansible.builtin.apt:
        deb: /tmp/google-chrome.deb
        state: present
      tags: [chrome]

    - name: "Nettoyer le fichier .deb Google Chrome"
      ansible.builtin.file:
        path: /tmp/google-chrome.deb
        state: absent
      tags: [chrome]

    # ======================
    # KVM / QEMU / libvirt
    # ======================
    - name: "Ajouter l'utilisateur aux groupes KVM et libvirt"
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups:
          - kvm
          - libvirt
        append: true
      notify: reboot_system
      tags: [kvm]

    - name: "Démarrer et activer libvirtd"
      become: true
      ansible.builtin.systemd:
        name: libvirtd
        state: started
        enabled: true
      tags: [kvm]

    # Suppression de virbr0 – on désactive le réseau default de libvirt
    # pour éviter la création automatique de l'interface virbr0
    - name: "Arrêter le réseau virtuel default (virbr0)"
      become: true
      ansible.builtin.command: virsh net-destroy default
      failed_when: false
      changed_when: false
      tags: [kvm]

    - name: "Désactiver le démarrage automatique du réseau default"
      become: true
      ansible.builtin.command: virsh net-autostart --disable default
      failed_when: false
      changed_when: false
      tags: [kvm]

    - name: "Supprimer l'interface virbr0 si elle existe encore"
      become: true
      ansible.builtin.command: ip link delete virbr0
      failed_when: false
      changed_when: false
      tags: [kvm]

    # ======================
    # Supprimer CUPS
    # ======================
    - name: "Arrêter le service cups"
      become: true
      ansible.builtin.systemd:
        name: cups.service
        state: stopped
      failed_when: false
      tags: [cups, cleanup]

    - name: "Désactiver le service cups"
      become: true
      ansible.builtin.systemd:
        name: cups.service
        enabled: false
        masked: true
      failed_when: false
      tags: [cups, cleanup]

    - name: "Supprimer CUPS (service d'impression)"
      become: true
      ansible.builtin.apt:
        name:
          - cups
          - cups-daemon
          - cups-browsed
        state: absent
        purge: true
      tags: [cups, cleanup]

    # ======================
    # NetworkManager – Désactiver envoi hostname DHCP
    # ======================
    - name: "Créer configuration NetworkManager pour désactiver hostname DHCP"
      become: true
      ansible.builtin.copy:
        dest: /etc/NetworkManager/conf.d/00-disable-dhcp-hostname.conf
        content: |
          [connection]
          ipv4.dhcp-send-hostname=no
          ipv6.dhcp-send-hostname=no
          ipv4.dhcp-hostname=
          ipv6.dhcp-hostname=
        mode: "0644"
      notify: reboot_system
      tags: [networkmanager, privacy]

    # ======================
    # Désactiver avahi-daemon
    # ======================
    - name: "Arrêter le service avahi-daemon"
      become: true
      ansible.builtin.systemd:
        name: avahi-daemon.service
        state: stopped
      failed_when: false
      tags: [avahi, privacy]

    - name: "Désactiver et masquer le service avahi-daemon"
      become: true
      ansible.builtin.systemd:
        name: avahi-daemon.service
        enabled: false
        masked: true
      failed_when: false
      tags: [avahi, privacy]

    - name: "Désactiver et masquer le socket avahi-daemon"
      become: true
      ansible.builtin.systemd:
        name: avahi-daemon.socket
        enabled: false
        masked: true
      failed_when: false
      tags: [avahi, privacy]

    # ======================
    # systemd-resolved – Configuration DNS
    # ======================
    - name: "Désactiver DNSStubListener dans systemd-resolved"
      become: true
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^\s*#?\s*DNSStubListener='
        line: 'DNSStubListener=no'
        insertafter: '^\[Resolve\]'
        create: true
        backup: true
      notify: reboot_system
      tags: [dns, systemd]

    - name: "Supprimer /etc/resolv.conf existant"
      become: true
      ansible.builtin.file:
        path: /etc/resolv.conf
        state: absent
      tags: [dns, systemd]

    - name: "Créer lien symbolique vers /run/systemd/resolve/resolv.conf"
      become: true
      ansible.builtin.file:
        src: /run/systemd/resolve/resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
      tags: [dns, systemd]

    # ======================
    # Docker
    # NOTE Ubuntu 26 : get.docker.com gère automatiquement la détection
    # de la distribution. Le script supporte Ubuntu 26 (plum).
    # ======================
    - name: "Vérifier si Docker est installé"
      ansible.builtin.command: docker --version
      register: docker_check
      failed_when: false
      changed_when: false
      tags: [docker]

    - name: "Installer Docker (get.docker.com)"
      become: true
      ansible.builtin.shell: curl -fsSL https://get.docker.com/ | sh
      args:
        executable: /bin/bash
      when: docker_check.rc != 0
      notify: reboot_system
      tags: [docker]

    - name: "Ajouter l'utilisateur au groupe docker"
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: true
      notify: reboot_system
      tags: [docker]

    - name: "Configurer Docker pour désactiver le bridge docker0"
      become: true
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "bridge": "none",
            "iptables": false
          }
        mode: "0644"
      notify: reboot_system
      tags: [docker]

    # ======================
    # VeraCrypt
    # NOTE Ubuntu 26 : vérifier la dernière version sur
    # https://www.veracrypt.fr/en/Downloads.html
    # Le nom du paquet inclut "Ubuntu-26.04" si disponible,
    # sinon utiliser la version Ubuntu 24.04 (compatible).
    # ======================
    - name: "Vérifier si VeraCrypt est déjà installé"
      ansible.builtin.command: which veracrypt
      register: veracrypt_check
      failed_when: false
      changed_when: false
      tags: [veracrypt]

    - name: "Télécharger VeraCrypt .deb (build Ubuntu 24.04 compatible)"
      ansible.builtin.get_url:
        url: https://launchpad.net/veracrypt/trunk/1.26.24/+download/veracrypt-1.26.24-Ubuntu-24.04-amd64.deb
        dest: /tmp/veracrypt.deb
        mode: "0644"
      when: veracrypt_check.rc != 0
      tags: [veracrypt]

    - name: "Installer VeraCrypt"
      become: true
      ansible.builtin.apt:
        deb: /tmp/veracrypt.deb
        state: present
      when: veracrypt_check.rc != 0
      tags: [veracrypt]

    - name: "Nettoyer le fichier .deb VeraCrypt"
      ansible.builtin.file:
        path: /tmp/veracrypt.deb
        state: absent
      tags: [veracrypt]

    # ======================
    # Balena Etcher
    # NOTE Ubuntu 26 : le .deb n'est plus compatible (libgdk-pixbuf2.0-0 supprimé).
    # Installation via AppImage + création d'un .desktop pour l'intégration GNOME.
    # ======================
    - name: "Vérifier si Balena Etcher AppImage est déjà installé"
      ansible.builtin.stat:
        path: /opt/balena-etcher/balena-etcher.AppImage
      register: etcher_check
      tags: [etcher]

    - name: "Créer le dossier /opt/balena-etcher"
      become: true
      ansible.builtin.file:
        path: /opt/balena-etcher
        state: directory
        mode: "0755"
      when: not etcher_check.stat.exists
      tags: [etcher]

    - name: "Télécharger Balena Etcher AppImage"
      become: true
      ansible.builtin.get_url:
        url: https://github.com/balena-io/etcher/releases/download/v2.1.4/balenaEtcher-2.1.4-x64.AppImage
        dest: /opt/balena-etcher/balena-etcher.AppImage
        mode: "0755"
      when: not etcher_check.stat.exists
      tags: [etcher]

    - name: "Créer le fichier .desktop pour Balena Etcher"
      become: true
      ansible.builtin.copy:
        dest: /usr/share/applications/balena-etcher.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=Balena Etcher
          Comment=Flash OS images to SD cards and USB drives
          Exec=/opt/balena-etcher/balena-etcher.AppImage
          Icon=balena-etcher
          Terminal=false
          Type=Application
          Categories=Utility;
      tags: [etcher]

    # ======================
    # GNOME Terminal – Terminal par défaut
    # NOTE : x-terminal-emulator est le système d'alternatives Debian/Ubuntu.
    # gsettings règle le terminal ouvert par GNOME (ex: clic droit bureau, raccourci).
    # ======================
    - name: "Définir gnome-terminal comme terminal par défaut (alternatives)"
      become: true
      ansible.builtin.command: update-alternatives --set x-terminal-emulator /usr/bin/gnome-terminal
      failed_when: false
      changed_when: false
      tags: [gnome, terminal]

    - name: "Définir gnome-terminal comme terminal GNOME par défaut (gsettings)"
      ansible.builtin.command: >
        gsettings set org.gnome.desktop.default-applications.terminal
        exec 'gnome-terminal'
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, terminal]

    - name: "Définir les arguments du terminal par défaut (gsettings)"
      ansible.builtin.command: >
        gsettings set org.gnome.desktop.default-applications.terminal
        exec-arg ''
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, terminal]

    # ======================
    # ZSH / Oh My Zsh
    # ======================
    - name: "Définir zsh comme shell par défaut"
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        shell: /usr/bin/zsh
      tags: [zsh]

    - name: "Vérifier Oh My Zsh"
      ansible.builtin.stat:
        path: "{{ omz_dir }}"
      register: omz_stat
      tags: [zsh]

    - name: "Installer Oh My Zsh"
      ansible.builtin.shell: |
        RUNZSH=no CHSH=no KEEP_ZSHRC=yes \
        sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
      args:
        executable: /bin/bash
      when: not omz_stat.stat.exists
      tags: [zsh]

    - name: "Forcer le thème gentoo"
      ansible.builtin.lineinfile:
        path: "{{ zshrc_path }}"
        regexp: '^ZSH_THEME='
        line: 'ZSH_THEME="gentoo"'
        create: true
      tags: [zsh]

    # ======================
    # Oh My Zsh – Plugins
    # ======================
    - name: "Installer plugins ZSH"
      ansible.builtin.git:
        repo: "{{ item.repo }}"
        dest: "{{ user_home }}/.oh-my-zsh/custom/plugins/{{ item.name }}"
        depth: 1
        update: true
      loop:
        - { name: zsh-syntax-highlighting, repo: https://github.com/zsh-users/zsh-syntax-highlighting.git }
        - { name: zsh-completions, repo: https://github.com/zsh-users/zsh-completions.git }
        - { name: zsh-autosuggestions, repo: https://github.com/zsh-users/zsh-autosuggestions.git }
        - { name: zsh-z, repo: https://github.com/agkozak/zsh-z.git }
        - { name: zsh-nvm, repo: https://github.com/lukechilds/zsh-nvm.git }
      tags: [zsh, plugins]

    - name: "Ajouter zsh-completions au fpath"
      ansible.builtin.blockinfile:
        path: "{{ zshrc_path }}"
        marker: "# {mark} ANSIBLE ZSH COMPLETIONS"
        insertbefore: '^source \$ZSH/oh-my-zsh\.sh'
        block: |
          fpath+=${ZSH_CUSTOM:-$HOME/.oh-my-zsh/custom}/plugins/zsh-completions/src
      tags: [zsh, plugins]

    - name: "Configurer plugins ZSH"
      ansible.builtin.lineinfile:
        path: "{{ zshrc_path }}"
        regexp: '^plugins='
        line: 'plugins=(zsh-syntax-highlighting zsh-completions zsh-autosuggestions tmux fzf zsh-z zsh-nvm)'
        create: true
      tags: [zsh, plugins]

    # ======================
    # ZSH – Aliases utiles
    # ======================
    - name: "Ajouter aliases ZSH utiles"
      ansible.builtin.blockinfile:
        path: "{{ zshrc_path }}"
        marker: "# {mark} ANSIBLE ZSH ALIASES"
        block: |
          # Système
          alias ports='netstat -tulanp'
          alias meminfo='free -m -l -t'
          alias psmem='ps auxf | sort -nr -k 4 | head -10'
          alias pscpu='ps auxf | sort -nr -k 3 | head -10'
          
          # Réseau
          alias myip='curl ifconfig.me'
          alias speed='speedtest-cli'
          
          # Téléchargement
          alias wget='wget -c'
          
          # Disque
          alias df='df -H'
          alias du='du -ch'
          
          # APT
          alias update='sudo apt update && sudo apt full-upgrade -y'
          alias cleanup='sudo apt autoremove -y && sudo apt autoclean'
          
          # Navigation
          alias ll='ls -lah'
          alias la='ls -A'
          alias l='ls -CF'
          
          # Sécurité
          alias chmod-files='find . -type f -exec chmod 644 {} \;'
          alias chmod-dirs='find . -type d -exec chmod 755 {} \;'
      tags: [zsh, aliases]

    # ======================
    # SSH – Configuration
    # ======================
    - name: "Créer le dossier .ssh si nécessaire"
      ansible.builtin.file:
        path: "{{ user_home }}/.ssh"
        state: directory
        mode: "0700"
      tags: [ssh]

    - name: "Créer le fichier de configuration SSH"
      ansible.builtin.copy:
        dest: "{{ user_home }}/.ssh/config"
        mode: "0600"
        content: |
          Host *
              ServerAliveInterval 30
              ServerAliveCountMax 3
              TCPKeepAlive yes
              ConnectTimeout 10
              ConnectionAttempts 3
      tags: [ssh]

    # ======================
    # Flameshot – Print Screen
    # ======================
    - name: "Désactiver tous les raccourcis screenshot GNOME"
      ansible.builtin.shell: |
        gsettings set org.gnome.shell.keybindings show-screenshot-ui "[]"
        gsettings set org.gnome.shell.keybindings screenshot "[]"
        gsettings set org.gnome.shell.keybindings screenshot-window "[]"
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, flameshot]

    - name: "Configurer Flameshot sur Print Screen"
      ansible.builtin.shell: |
        gsettings set org.gnome.settings-daemon.plugins.media-keys custom-keybindings "['/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/flameshot/']"
        gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybinding:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/flameshot/ name 'Flameshot'
        gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybinding:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/flameshot/ command 'flameshot gui'
        gsettings set org.gnome.settings-daemon.plugins.media-keys.custom-keybinding:/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/flameshot/ binding 'Print'
      args:
        executable: /bin/bash
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      changed_when: false
      tags: [gnome, flameshot]

    # ======================
    # Exegold
    # NOTE Ubuntu 26 : utilisation de python3 générique + venv,
    # le venv sera créé avec le python_version défini en vars.
    # ======================
    - name: "Cloner Exegold"
      ansible.builtin.git:
        repo: https://github.com/fsoc106/Exegold
        dest: "{{ exegold_dir }}"
        update: true
      tags: [exegold]

    - name: "Créer venv pour Exegold"
      ansible.builtin.command: "{{ python_version }} -m venv {{ exegold_venv }}"
      args:
        creates: "{{ exegold_venv }}"
      tags: [exegold]

    - name: "Installer requirements Exegold dans venv"
      ansible.builtin.pip:
        requirements: "{{ exegold_dir }}/requirements.txt"
        virtualenv: "{{ exegold_venv }}"
      tags: [exegold]

    - name: "Créer script wrapper exegol"
      become: true
      ansible.builtin.copy:
        dest: /usr/local/bin/exegol
        mode: "0755"
        content: |
          #!/bin/bash
          {{ exegold_venv }}/bin/python {{ exegold_dir }}/exegol.py "$@"
      tags: [exegold]

    # ======================
    # Docker – Nettoyage interface docker0
    # ======================
    - name: "Arrêter le service Docker"
      become: true
      ansible.builtin.systemd:
        name: docker
        state: stopped
      tags: [docker, cleanup]

    - name: "Supprimer l'interface docker0 si elle existe"
      become: true
      ansible.builtin.command: ip link delete docker0
      failed_when: false
      tags: [docker, cleanup]

    - name: "Redémarrer le service Docker"
      become: true
      ansible.builtin.systemd:
        name: docker
        state: started
        daemon_reload: true
      tags: [docker, cleanup]

    # ======================
    # Attente + Reboot
    # ======================
    - name: "Forcer le reboot si nécessaire"
      ansible.builtin.meta: flush_handlers
      tags: [reboot]

    - name: "Attendre confirmation avant reboot"
      ansible.builtin.pause:
        prompt: "Le système va redémarrer dans 1 minute. Appuyez sur Entrée pour continuer ou Ctrl+C puis 'A' pour annuler le reboot"
      tags: [reboot]

    # ======================
    # GNOME – Applications favorites dans le dock (fin du déploiement)
    # ======================
    - name: "Configurer les applications favorites dans le dock (final)"
      ansible.builtin.command: >
        gsettings set org.gnome.shell favorite-apps
        "['org.gnome.Nautilus.desktop', 'gnome-terminal.desktop', 'google-chrome.desktop',
        'mullvad-vpn.desktop', 'cherrytree.desktop', 'org.gnome.TextEditor.desktop',
        'veracrypt.desktop', 'snap-store_snap-store.desktop', 'chrome-faolnafnngnfdaknnbpnkhgohbobgegn-Default.desktop',
        'chrome-cifhbcnohmdccbgoicgdjpfamggdegmo-Default.desktop', 'chrome-nfnklejkcmehokldgamdannfigjighke-Default.desktop',
        'chrome-blgdilankhbcpipclgpdndahbehalgkh-Default.desktop', 'chrome-cadlkienfkclaiaibeoongdcgmdikeeg-Default.desktop',
        'balena-etcher.desktop', 'rpi-imager_rpi-imager.desktop']"
      environment:
        DBUS_SESSION_BUS_ADDRESS: "{{ dbus_addr }}"
      failed_when: false
      changed_when: false
      tags: [gnome, dock]

    - name: "Message final"
      ansible.builtin.debug:
        msg: "Configuration Ubuntu 26 terminée ! Le système redémarrera dans 1 minute si des changements l'exigent."
      tags: [reboot]
